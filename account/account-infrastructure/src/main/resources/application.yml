spring:
  application:
    name: customer
    
  datasource:
    # 1. Defaults to local PostgreSQL for IDE running; overridden completely by Docker Compose envs
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/banking_db}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:YourSecurePassword123!}
    
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true # Fixed indentation hierarchy here
    defer-datasource-initialization: true  
    
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
    exchange: customer.event
    queue:
      routingCustomerCreatedKey: customer.created
      routingCustomerDeletedKey: customer.deleted
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    template:
      # Forces messages to stay ephemeral in RAM across the whole app context
      delivery-mode: ${SPRING_RABBITMQ_TEMPLATE_DELIVERY_MODE:non_persistent}

server:
  port: 8080
