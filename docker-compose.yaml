services:
  # 1. Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: banking-rabbitmq
    ports:
      - "5672:5672" # RabbitMQ AMQP port
      - "15672:15672" # RabbitMQ Management Dashboard UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Database (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    ports:
      - "5432:5432" # Default PostgreSQL Port
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YourSecurePassword123!
      POSTGRES_DB: banking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d banking_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Your Spring Boot Customer Application
  customer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOMAIN_NAME: "customer"
    container_name: banking-customer-service
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Database connection parameters pointed to PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: YourSecurePassword123!
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

      # RabbitMQ configuration
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      # Explicitly forces all sent messages to remain RAM-only (ephemeral)
      SPRING_RABBITMQ_TEMPLATE_DELIVERY_MODE: non_persistent

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOMAIN_NAME: "account"
    container_name: banking-account-service
    ports:
      - "8083:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Database connection parameters pointed to PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: YourSecurePassword123!
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

      # RabbitMQ configuration
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      # Explicitly forces all sent messages to remain RAM-only (ephemeral)
      SPRING_RABBITMQ_TEMPLATE_DELIVERY_MODE: non_persistent
  reports-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOMAIN_NAME: "reports"
    container_name: banking-reports-service
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection parameters pointed to PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: YourSecurePassword123!

# Volume definitions to persist setup configurations and DB states
volumes:
  rabbitmq_data:
  postgres_data:
